<!-- ===== HTML ===== -->
<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ukessjekk</title>
  <link rel="stylesheet" href="spiller-refleksjon.css">
</head>
<body>

<div class="container">

  <h1>⚽ Ukessjekk</h1>

  <!-- Sesongmål -->
  <div class="card">
    <button id="goalToggleBtn">🎯 Vil du sette deg et mål for sesongen?</button>

    <div id="goalBox" hidden>
      <textarea id="seasonGoal" placeholder="Skriv målet ditt..."></textarea>
      <button id="saveGoalBtn">Lagre mål</button>
      <p id="goalStatus"></p>
    </div>
  </div>

  <!-- Refleksjon -->
  <div class="card">

<div class="buttons multi" id="type">
  <button data-value="training">⚽ Trening</button>
  <button data-value="match">🏆 Kamp</button>
</div>

<h3 id="funTitle">😄 Hvor gøy var trening denne uken?</h3>
    <div class="buttons" id="fun">
      <button data-value="1">1</button>
      <button data-value="2">2</button>
      <button data-value="3">3</button>
      <button data-value="4">4</button>
      <button data-value="5">5</button>
    </div>

    <h3>⚡ Kva synest du om egen innsats?</h3>
    <div class="buttons" id="effort">
      <button data-value="1">1</button>
      <button data-value="2">2</button>
      <button data-value="3">3</button>
      <button data-value="4">4</button>
      <button data-value="5">5</button>
    </div>

    <h3>🔋 Korleis var energien din?</h3>
    <div class="buttons" id="energy">
      <button data-value="1">1</button>
      <button data-value="2">2</button>
      <button data-value="3">3</button>
      <button data-value="4">4</button>
      <button data-value="5">5</button>
    </div>

<h3 id="moreTitle">🎯 Kva vil du ha meir av?</h3>
    <div class="buttons multi" id="more">
      <button data-value="spill">Spill</button>
      <button data-value="avslutning">Avslutningar</button>
      <button data-value="taktikk">Taktikk</button>
      <button data-value="intensitet">Intensitet</button>
	  <button data-value="pasninger">Pasningar</button>
    </div>
	
	<div id="moreMatch" hidden>
  <div class="buttons multi" id="moreMatchButtons">
    <button data-value="valg">Valg</button>
    <button data-value="posisjonering">Posisjonering</button>
    <button data-value="dueller">Duellar</button>
    <button data-value="tempo">Tempo</button>
    <button data-value="avslutning">Avslutning</button>
  </div>
</div>

<!-- Frivillig melding til trener -->
<button id="coachNoteToggleBtn">
  💬 Skriv noe til trener hvis du vil
</button>

<div id="coachNoteBox" hidden>
  <textarea id="coachNote" placeholder="Valgfritt..."></textarea>
</div>
    <button id="submitBtn" disabled>🚀 Send</button>
    <p id="status"></p>

  </div>

</div>

<script type="module" src="spiller-refleksjon.js"></script>
</body>
</html>
