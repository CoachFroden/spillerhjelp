<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Legg</title>
<link rel="stylesheet" href="legg.css">
</head>
<body>

<div id="app">

<!-- START -->
<section id="start" class="screen active">

  <div id="homeBack">←</div>

  <div class="hero">
    <h1>Legg</h1>

    <p class="intro">
      Krampe og smerter i leggen kan stoppe deg i kamp.
      Her lærer du hvordan du roer det ned, bygger deg opp igjen og unngår at det skjer på nytt.
    </p>

    <p class="intro small">
      Start her hvis du kjenner stramhet, krampe eller smerte i leggen.
    </p>
  </div>

  <div class="menu">

    <button class="primary" onclick="startTest()">
      <strong>Test nivå</strong><br>
      <span>Finn riktig start automatisk</span>
    </button>

    <button onclick="startPhase('pain')">
      <strong>Har vondt / krampe nå</strong><br>
      <span>Hvis leggen strammer, kramper eller gjør vondt</span>
    </button>

    <button onclick="startPhase('better')">
      <strong>Føles litt bedre</strong><br>
      <span>Du kan bevege deg, men ikke belaste fullt</span>
    </button>

    <button onclick="startPhase('almost')">
      <strong>Nesten klar</strong><br>
      <span>Du kan løpe litt, men ikke gå hardt til</span>
    </button>

    <button onclick="startPhase('ready')">
      <strong>Testøkt</strong><br>
      <span>Test deg før full trening eller kamp</span>
    </button>

    <button onclick="startPhase('prevent')">
      <strong>Forebygging</strong><br>
      <span>Unngå krampe før, under og etter kamp</span>
    </button>

  </div>

</section>

<!-- ØKT -->
<section id="workout" class="screen">

  <div id="backBtn">✕</div>

  <div id="levelHeader">
    <div id="levelBig"></div>
    <div id="levelSmall"></div>
  </div>

  <div class="progressWrap">
    <div id="step"></div>
  </div>

  <div id="testHeader" class="testHeader">
    <div id="testTitle" class="testTitle"></div>
    <div id="testProgress" class="testProgress"></div>
  </div>

  <div class="card" id="exerciseBox">
    <h2 id="title"></h2>
    <p id="desc"></p>
  </div>

  <div id="hint">Trykk på kortet for forklaring</div>

  <button id="next">START</button>
  <button id="yesBtn" style="display:none;">JA</button>
  <button id="noBtn" style="display:none;">NEI</button>

  <div id="tip"></div>

</section>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modalContent">
    <p id="modalText"></p>
  </div>
</div>

</div>

<script src="legg.js"></script>
</body>
</html>
